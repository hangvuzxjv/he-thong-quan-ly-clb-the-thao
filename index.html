<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý CLB Thể Thao</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h2 class="text-center text-primary mb-4">HỆ THỐNG QUẢN LÝ CÂU LẠC BỘ THỂ THAO</h2>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card shadow-sm p-4 mb-4">
                    <h4 class="text-success mb-3">Đăng Ký Hội Viên Mới</h4>
                    <form id="formDangKy">
                        <div class="mb-3">
                            <label class="form-label">Họ và Tên</label>
                            <input type="text" id="hoTen" class="form-control" placeholder="Nhập họ tên..." required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Số Điện Thoại</label>
                            <input type="text" id="sdt" class="form-control" placeholder="Nhập số điện thoại..." required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" placeholder="Nhập email..." required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Đăng Ký & Cấp Mã Số Thẻ</button>
                    </form>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm p-4 bg-dark text-white" style="min-height: 315px;">
                    <h4 class="text-warning mb-3">Màn Hình Log Hệ Thống</h4>
                    <div id="logManHinh" style="font-family: monospace; font-size: 14px;">
                        [Hệ thống] Sẵn sàng nhận dữ liệu đăng ký...
                    </div>
                </div>
            </div>
        </div>
        <div class="card shadow-sm p-4 mt-4">
                    <h4 class="text-primary mb-3">Mua / Gia Hạn Gói Tập</h4>
                    <form id="formGiaHan">
                        <div class="mb-3">
                            <label class="form-label">Mã Số Hội Viên</label>
                            <input type="text" id="maHoiVienGiaHan" class="form-control" placeholder="Ví dụ: HV20260005" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Chọn Gói Tập</label>
                            <select id="maGoiTap" class="form-select">
                                <option value="GYM01">Gói Gym Cơ Bản (1 tháng) - 500.000 VND</option>
                                <option value="YOGA06">Gói Yoga Thượng Hạng (6 tháng) - 2.500.000 VND</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Thanh Toán & Kích Hoạt Thẻ</button>
                    </form>
          
              </div>
              <div class="card shadow-sm p-4 mt-4 border-warning">
                    <h4 class="text-warning mb-3">Cổng Điểm Danh (Check-in)</h4>
                    <form id="formCheckIn">
                        <div class="mb-3">
                            <label class="form-label">Nhập hoặc Quét Mã Thẻ Hội Viên</label>
                            <input type="text" id="maHoiVienCheckIn" class="form-control" placeholder="Ví dụ: HV20260007" required>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 text-dark fw-bold">Xác Nhận Check-in</button>
                    </form>
                </div>
    </div>

    <script>
        document.getElementById('formDangKy').addEventListener('submit', async function(e) {
    e.preventDefault(); // Chặn trang web bị tải lại
    
    const hoTen = document.getElementById('hoTen').value;
    const soDienThoai = document.getElementById('sdt').value;
    const email = document.getElementById('email').value;

    // GỬI DỮ LIỆU THẬT LÊN SERVER BACKEND QUA API
    const response = await fetch('/api/dang-ky', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ hoTen, soDienThoai, email })
    });

    const result = await response.json();

    // HIỂN THỊ KẾT QUẢ TRẢ VỀ TỪ DATABASE THẬT
    const logBox = document.getElementById('logManHinh');
    if (result.success) {
        logBox.innerHTML = `
            <p class="text-info">----------------------------------------</p>
            <p class="text-success">✔ ĐÃ LƯU VÀO DATABASE THẬT!</p>
            <p><b>Hội viên:</b> ${result.hoTen}</p>
            <p class="text-warning"><b>👉 Mã số thẻ chính thức: ${result.maHoiVien}</b></p>
        `;
        document.getElementById('formDangKy').reset(); // Xóa sạch ô nhập
    } else {
        logBox.innerHTML = `<p class="text-danger">❌ Lỗi hệ thống: ${result.error}</p>`;
    }
});
    // XỬ LÝ SỰ KIỆN BẤM NÚT GIA HẠN / MUA GÓI TẬP
        document.getElementById('formGiaHan').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const maHoiVien = document.getElementById('maHoiVienGiaHan').value;
            const maGoiTap = document.getElementById('maGoiTap').value;

            const response = await fetch('/api/gia-han', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ maHoiVien, maGoiTap })
            });

            const result = await response.json();
            const logBox = document.getElementById('logManHinh');

            if (result.success) {
                logBox.innerHTML = `
                    <p class="text-info">----------------------------------------</p>
                    <p class="text-primary">✔ THANH TOÁN & GIA HẠN THÀNH CÔNG!</p>
                    <p><b>Mã hội viên:</b> ${result.maHoiVien}</p>
                    <p><b>Gói đăng ký:</b> ${result.tenGoiTap}</p>
                    <p class="text-success"><b>Hạn thẻ:</b> Từ ${result.ngayBatDau} đến ${result.ngayHetHan}</p>
                `;
                document.getElementById('formGiaHan').reset();
            } else {
                logBox.innerHTML = `<p class="text-danger">❌ Lỗi: ${result.error}</p>`;
            }
        });
        // XỬ LÝ SỰ KIỆN BẤM NÚT CHECK-IN ĐIỂM DANH
        document.getElementById('formCheckIn').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const maHoiVien = document.getElementById('maHoiVienCheckIn').value;

            const response = await fetch('/api/check-in', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ maHoiVien })
            });

            const result = await response.json();
            const logBox = document.getElementById('logManHinh');

            if (result.success) {
                logBox.innerHTML = `
                    <p class="text-info">----------------------------------------</p>
                    <p class="text-warning font-weight-bold">🔔 CỔNG KIỂM SOÁT: ${result.message}</p>
                    <p><b>Mã số thẻ:</b> ${result.maHoiVien}</p>
                    <p><b>Thời gian vào:</b> ${result.thoiGian}</p>
                    <p class="text-success"><b>Hạn gói tập còn đến:</b> ${result.ngayHetHan}</p>
                `;
                document.getElementById('formCheckIn').reset();
            } else {
                logBox.innerHTML = `
                    <p class="text-info">----------------------------------------</p>
                    <p class="text-danger">❌ TỪ CHỐI TRUY CẬP: ${result.message}</p>
                `;
            }
        });
    </script>
</body>
</html>
