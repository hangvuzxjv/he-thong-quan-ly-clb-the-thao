<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý CLB Thể Thao - QR Code</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-light">

    <div class="container mt-4">
        <h2 class="text-center text-primary mb-4">HỆ THỐNG QUẢN LÝ CLB THỂ THAO - QR CHECK-IN</h2>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card shadow-sm p-4 mb-4">
                    <h4 class="text-success mb-3">Đăng Ký Hội Viên Mới</h4>
                    <form id="formDangKy">
                        <div class="mb-3"><label class="form-label">Họ và Tên</label><input type="text" id="hoTen" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Số Điện Thoại</label><input type="text" id="sdt" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Email</label><input type="email" id="email" class="form-control" required></div>
                        <button type="submit" class="btn btn-success w-100">Đăng Ký & Cấp Mã Số Thẻ</button>
                    </form>
                </div>

                <div class="card shadow-sm p-4 mb-4">
                    <h4 class="text-primary mb-3">Mua / Gia Hạn Gói Tập</h4>
                    <form id="formGiaHan">
                        <div class="mb-3"><label class="form-label">Mã Số Hội Viên</label><input type="text" id="maHoiVienGiaHan" class="form-control" required></div>
                        <div class="mb-3">
                            <label class="form-label">Chọn Gói Tập</label>
                            <select id="maGoiTap" class="form-select">
                                <option value="GYM01">Gói Gym Cơ Bản (1 tháng) - 500.000 VND</option>
                                <option value="YOGA06">Gói Yoga Thượng Hạng (6 tháng) - 2.500.000 VND</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Thanh Toán & Kích Hoạt Thẻ</button>
                    </form>
                </div>

                <div class="card shadow-sm p-4 border-warning mb-4">
                    <h4 class="text-warning mb-3">Cổng Điểm Danh Bằng QR Code</h4>
                    
                    <div id="reader" style="width: 100%; max-width: 400px; margin: 0 auto;" class="mb-3"></div>
                    
                    <form id="formCheckIn">
                        <div class="mb-3">
                            <label class="form-label">Mã Số Thẻ (Tự động điền khi quét QR)</label>
                            <input type="text" id="maHoiVienCheckIn" class="form-control" placeholder="Quét QR hoặc nhập tay..." required>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 text-dark fw-bold">Xác Nhận Check-in</button>
                    </form>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm p-4 mb-4 text-center bg-white border-primary">
                    <h4 class="text-primary mb-3">Thẻ Hội Viên Điện Tử</h4>
                    <div id="qrcode" class="d-flex justify-content-center my-3"></div>
                    <p class="text-muted" id="qrGhiChu">Mã QR sẽ tự động sinh tại đây khi đăng ký thành công!</p>
                </div>

                <div class="card shadow-sm p-4 bg-dark text-white" style="min-height: 300px;">
                    <h4 class="text-warning mb-3">Màn Hình Log Hệ Thống</h4>
                    <div id="logManHinh" style="font-family: monospace; font-size: 14px;">
                        [Hệ thống] Sẵn sàng nhận dữ liệu...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. LOGIC SINH MÃ QR (QRCode.js)
        const qrcodeContainer = document.getElementById("qrcode");
        const qrCode = new QRCode(qrcodeContainer, { width: 180, height: 180 });

        function capNhatMaQR(maHoiVien) {
            qrCode.clear(); 
            qrCode.makeCode(maHoiVien); // Sinh mã QR chứa nội dung là mã hội viên
            document.getElementById("qrGhiChu").innerHTML = `<b>Mã số thẻ của bạn: ${maHoiVien}</b><br>Hãy đưa mã này trước Camera để điểm danh!`;
        }

        // 2. LOGIC QUÉT MÃ QR QUA WEBCAM (Html5-QRCode)
        function onScanSuccess(decodedText, decodedResult) {
            // Khi quét trúng mã QR, tự động điền nội dung vào ô nhập và kích hoạt bấm nút luôn
            document.getElementById("maHoiVienCheckIn").value = decodedText;
            document.getElementById("formCheckIn").requestSubmit(); 
        }
        
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);

        // --- CÁC HÀM XỬ LÝ API GIỮ NGUYÊN ---
        // Form Đăng Ký
        document.getElementById('formDangKy').addEventListener('submit', async function(e) {
            e.preventDefault();
            const response = await fetch('/api/dang-ky', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ hoTen: document.getElementById('hoTen').value, soDienThoai: document.getElementById('sdt').value, email: document.getElementById('email').value })
            });
            const result = await response.json();
            if (result.success) {
                document.getElementById('logManHinh').innerHTML = `<p class="text-success">✔ ĐÃ LƯU DATABASE THẬT!<br><b>Mã số thẻ chính thức: ${result.maHoiVien}</b></p>`;
                capNhatMaQR(result.maHoiVien); // Tự động tạo QR ngay khi đăng ký xong
                document.getElementById('formDangKy').reset();
            }
        });

        // Form Gia Hạn
        document.getElementById('formGiaHan').addEventListener('submit', async function(e) {
            e.preventDefault();
            const response = await fetch('/api/gia-han', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ maHoiVien: document.getElementById('maHoiVienGiaHan').value, maGoiTap: document.getElementById('maGoiTap').value })
            });
            const result = await response.json();
            if (result.success) {
                document.getElementById('logManHinh').innerHTML = `<p class="text-primary">✔ GIA HẠN THÀNH CÔNG!<br><b>Hạn thẻ:</b> ${result.ngayBatDau} đến ${result.ngayHetHan}</p>`;
                capNhatMaQR(result.maHoiVien); // Tạo lại QR hiển thị cho hội viên
                document.getElementById('formGiaHan').reset();
            }
        });

        // Form Điểm Danh
        document.getElementById('formCheckIn').addEventListener('submit', async function(e) {
            e.preventDefault();
            const response = await fetch('/api/check-in', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ maHoiVien: document.getElementById('maHoiVienCheckIn').value })
            });
            const result = await response.json();
            const logBox = document.getElementById('logManHinh');
            if (result.success) {
                logBox.innerHTML = `<p class="text-warning font-weight-bold">🔔 CỔNG KIỂM SOÁT: ${result.message}</p><p><b>Mã số thẻ:</b> ${result.maHoiVien}</p><p><b>Thời gian:</b> ${result.thoiGian}</p>`;
                document.getElementById('formCheckIn').reset();
            } else {
                logBox.innerHTML = `<p class="text-danger font-weight-bold">❌ TỪ CHỐI TRUY CẬP: ${result.message}</p>`;
            }
        });
    </script>
</body>
</html>
